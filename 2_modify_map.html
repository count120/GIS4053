<!-- 
    Assignment 2: Modify a leaflet web map
    In this assignment you will start with a working web map, and then modify and add to it.

    Task:

    1. Replace the tile layer with a different one.
    hint: use the Leaflet Providers page to find one: https://leaflet-extras.github.io/leaflet-providers/preview/
    2. Add new markers to the map at three of your favorite locations around Duluth.
    - Each marker should have a popup that includes the name of the location and a fun fact about it.
    - At least one of the markers should have an image or video in the popup.
    - You can remove the existing marker for the UMD campus if you want.
    3. Center the map on Duluth (change the zoom level as well if you want).
    4. Modify the title and subtitle to reflect your name and the theme of your map.
    5. Add a paragraph to the paragraph describing your map and the locations you added.
    6. Modify the style of each of the elements (header, paragraph, and map) to your liking.
    - At a minimum, remove the inline style on the map div and add your own CSS to the style tag in the head of the document.
    - Make the map more prominent on the page by increasing its size and/or changing its position.

    AI use: you can ask questions of AI (such as "explain what this line of code does" or "how do I create a popup in Leaflet?") 
    But try and write the code yourself. 
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landmarks of Duluth</title>
    
    <!-- Leaflet CSS stylesheet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>

		body {
    font-family: Arial, sans-serif;
    margin: 0;
    background-color: #f4f6f7;
    text-align: center;
}

.header {
    background-color: #2c3e50;
    color: white;
    padding: 15px;
}

h1 {
    margin: 5px;
}

h2 {
    margin: 5px;
    font-weight: normal;
}

p {
    width: 65%;
    margin: 20px auto;
    font-size: 16px;
}

#map {
    height: 550px;
    width: 80%;
    margin: 20px auto;
    border-radius: 10px;
    border: 2px solid #333;
}

        /* full page leaflet map */
        
    </style>
</head>
<body>
    <!-- Header at the top of the page -->
    <div class="header">
       <h1>Maria's Favorite Spots in Duluth</h1>
         <h3>by: Maria Counts</h3>
           <p>This map shows some of my favorite places around Duluth that I like to go to. 
            I picked locations that have good views, are relaxing, or are just fun to visit. 
             Each spot has something unique about it, like hiking, scenery, or being near the water.
            </p> 
    </div>
   <div id="map"></div>
    
    <!-- Leaflet JavaScript library -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        // Initialize the map, center it on UMD campus, and set the zoom level
      const map = L.map('map').setView([46.7867, -92.1005], 12);

        // Add Esri Satellite tiles
        const tiles = L.tileLayer('https://{s}.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png', {
	maxZoom: 19,
	attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors, Tiles style by <a href="https://www.hotosm.org/" target="_blank">Humanitarian OpenStreetMap Team</a> hosted by <a href="https://openstreetmap.fr/" target="_blank">OpenStreetMap France</a>'
});

        // add tiles to the map
        tiles.addTo(map);

        // add marker at Hartley Nature Center


        // Add a marker for the UMD campus
        

		L.marker([46.7867, -92.1005]).addTo(map)
    .bindPopup("<b>Canal Park</b><br>Super popular spot with the lift bridge.");

        L.marker([46.8147, -92.1076]).addTo(map)
         .bindPopup("<b>Enger Tower</b><br>Best view of Duluth if you climb it.");

     L.marker([46.8663, -92.0282]).addTo(map)
    .bindPopup(`
        <b>Brighton Beach</b><br>
        Chill place to watch waves.<br>
        <img src="https://upload.wikimedia.org/wikipedia/commons/5/5e/Brighton_Beach_Duluth.jpg" width="200">
    `);
    </script>
</body>
</html>
